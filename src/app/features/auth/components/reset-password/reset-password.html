<app-auth-layout [title]="'auth.reset.title' | translate">
  <div class="h-full" auth-form>
    <!-- Start Of Form-->
    <form [formGroup]="resetForm" (ngSubmit)="onResetPass()" class="pb-8">

      <!-- Email -->
      <app-form-field [readonly]="true" [control]="form['email']" type="email" icon="pi pi-envelope"
        [label]="'auth.reset.email_label' | translate" [placeholder]="'auth.reset.email_placeholder' | translate"
        [errorMessages]="{
          required: 'auth.reset.email_required',
          email: 'auth.reset.email_invalid'
        }">
      </app-form-field>

      <!-- OTP -->
      <app-form-field [control]="form['otp']" type="text" icon="pi pi-key" [label]="'auth.reset.otp_label' | translate"
        [placeholder]="'auth.reset.otp_placeholder' | translate" [errorMessages]="{
          required: 'auth.reset.otp_required'
        }">
      </app-form-field>

      <!-- Password -->
      <app-form-field [control]="form['password']" type="password" icon="pi pi-lock"
        [label]="'auth.reset.new_password_label' | translate"
        [placeholder]="'auth.reset.pasword_placeholder' | translate" [errorMessages]="{
          required: 'auth.reset.password_required',
          pattern: 'auth.reset.password_pattern'
        }">
      </app-form-field>

      <div>
        <p-button type="submit" [label]="'auth.reset.reset_button' | translate" icon="pi pi-check" iconPos="right"
          [loading]="loading()" styleClass="form-btn">
        </p-button>
      </div>

    </form>
  </div>
</app-auth-layout>
