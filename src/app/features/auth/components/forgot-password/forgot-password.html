<app-auth-layout [title]="'auth.forgot.title' | translate">
  <div class="h-full" auth-form>
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <!-- Email -->
      <div class="mb-[2rem]">
        <app-form-field
          [control]="form['email']"
          type="email"
          [label]="'auth.login.email_label' | translate"
          [placeholder]="'auth.login.email_placeholder' | translate"
          [errorMessages]="{
            required: 'auth.login.email_required',
            email: 'auth.login.email_invalid'
          }">
        </app-form-field>
      </div>

      <!-- Submit -->
      <div class="mt-[50px]">
        <p-button
          type="submit"
          [label]="'auth.forgot.button' | translate"
          [loading]="isLoading"
          styleClass="w-full">
        </p-button>
      </div>
    </form>
  </div>
</app-auth-layout>
