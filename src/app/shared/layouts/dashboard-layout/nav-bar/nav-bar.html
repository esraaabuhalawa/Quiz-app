<header class="app-header flex align-items-center justify-content-between">
  <h2 class="m-0">{{ pageTitle() }}</h2>

  <div class="flex align-items-center gap-4 justify-content-between w-5">
    <p-button label="New quiz" outlined (onClick)="onNewQuiz()">
      <ng-template pTemplate="icon">
        <img src="/images/new quiz icon.svg" alt="New Quiz" width="18" height="18" /> </ng-template
    ></p-button>
    <div class="w-3">
      <div
        class="flex align-items-center gap-2 cursor-pointer w=[100%]"
        (click)="userMenu.toggle($event)"
      >
        <p-avatar [label]="userInitials()" shape="circle" styleClass="bg-purple-500 text-white" />
        <div class="flex flex-column line-height-2">
          <span class="font-medium text-sm">{{ userName() }}</span>
          <span class="text-xs" style="color: #c5d86d">{{ userRole() }}</span>
        </div>
        <i class="pi pi-chevron-down text-sm"></i>
      </div>
      <p-menu #userMenu [popup]="true" [model]="userMenuItems" />
    </div>
  </div>
</header>
