<div class="quiz-card">
  <div class="flex align-items-center justify-content-between mb-3">
    <h3 class="m-0 text-xl font-bold">Upcoming {{ quizzes().length }} quizzes</h3>
    <a
      routerLink="/quizzes"
      class="flex align-items-center gap-2 text-sm text-color-secondary no-underline"
    >
      <span>Quiz directory</span>
      <a routerLink="quizzes" class="no-underline">
        <i class="pi pi-arrow-right quiz-card__link-icon"></i
      ></a>
    </a>
  </div>

  <div class="flex flex-column gap-3">
    @for (quiz of quizzes(); track quiz._id) {
      <div class="quiz-card__item flex align-items-center gap-3 p-3 border-round-lg">
        <div class="quiz-card__image-container">
          <img [src]="imgSrc()" [alt]="quiz.title" class="quiz-card__image border-round-lg" />
        </div>

        <div class="flex-1 flex flex-column gap-2">
          <div>
            <h4 class="m-0 text-lg font-bold">{{ quiz.title }}</h4>
            <div class="flex align-items-center gap-2 text-sm text-color-secondary mt-1">
              <span>{{ quiz.schadule | date: 'dd/MM/yyyy' }}</span>
              <span>|</span>
              <span>{{ quiz.schadule | date: 'h:mm a' }}</span>
            </div>
          </div>

          <div class="flex align-items-center justify-content-between">
            <span class="text-sm font-medium"
              >No. of student's enrolled: {{ quiz.participants }}</span
            >
            <a
              [routerLink]="['view-quiz', quiz._id]"
              class="quiz-card__open-link flex align-items-center gap-2 text-sm font-bold no-underline"
            >
              <span>Open</span>

              <i class="pi pi-arrow-right quiz-card__open-icon"></i>
            </a>
          </div>
        </div>
      </div>
    }
  </div>
</div>
