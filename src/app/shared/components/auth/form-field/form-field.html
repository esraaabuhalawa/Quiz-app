<div class="form-field">
  <label class="form-field__label">
    {{ label | translate }}
  </label>

  <p-iconfield iconPosition="left" class="form-field__input" [class.form-field__input--error]="showError">
    @if (icon) {
    <p-inputicon [class]="icon"></p-inputicon>
    }
    @if (type === 'password') {
    <p-password [formControl]="$any(control)" [toggleMask]="true" [feedback]="false"
      [placeholder]="placeholder | translate" [autocomplete]="autocomplete" styleClass="form-field__password w-full"
      inputStyleClass="w-full">
    </p-password>
    } @else {
    <input pInputText class="form-field__text w-full" [type]="type" [formControl]="$any(control)"
      [placeholder]="placeholder | translate" [autocomplete]="autocomplete" />
    }
  </p-iconfield>

  @if (showError && firstError) {
  <small class="form-field__error">
    {{ firstError | translate }}
  </small>
  }

  @if (customError) {
  <small class="form-field__error">
    {{ customErrorMessage | translate }}
  </small>
  }
</div>
